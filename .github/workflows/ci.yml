name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Boundary check
        run: pnpm run check:boundaries

      - name: Build
        run: pnpm -r build

      - name: Test (per-package, AC-1 oracle)
        run: pnpm -r test

      - name: Test (workspace, incl. tooling self-guard tests)
        run: pnpm test
